name: Daily Radar

on:
  schedule:
    - cron: '30 11 * * 1-5'  # 08:30 BRT
    - cron: '00 16 * * 1-5'  # 13:00 BRT
    - cron: '00 21 * * 1-5'  # 18:00 BRT
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Gerar radar.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_radar.py

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build
        env:
          VITE_BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
