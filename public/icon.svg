<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0A0A0A"/>
  <!-- Grid lines -->
  <line x1="60" y1="380" x2="452" y2="380" stroke="#1F1F1F" stroke-width="2"/>
  <line x1="60" y1="300" x2="452" y2="300" stroke="#1F1F1F" stroke-width="2"/>
  <line x1="60" y1="220" x2="452" y2="220" stroke="#1F1F1F" stroke-width="2"/>
  <line x1="60" y1="140" x2="452" y2="140" stroke="#1F1F1F" stroke-width="2"/>
  <!-- Bars -->
  <rect x="70"  y="280" width="55" height="100" fill="#F5A623" opacity="0.7" rx="4"/>
  <rect x="160" y="200" width="55" height="180" fill="#F5A623" opacity="0.7" rx="4"/>
  <rect x="250" y="240" width="55" height="140" fill="#00D4AA" opacity="0.7" rx="4"/>
  <rect x="340" y="140" width="55" height="240" fill="#00D4AA" opacity="0.7" rx="4"/>
  <!-- Trend line -->
  <polyline
    points="97,280 187,200 277,190 367,140"
    stroke="#F5A623"
    stroke-width="8"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="97"  cy="280" r="10" fill="#F5A623"/>
  <circle cx="187" cy="200" r="10" fill="#F5A623"/>
  <circle cx="277" cy="190" r="10" fill="#00D4AA"/>
  <circle cx="367" cy="140" r="10" fill="#00D4AA"/>
  <!-- Bottom text -->
  <text x="256" y="470" font-family="monospace" font-size="52" fill="#F5A623"
        text-anchor="middle" font-weight="bold" letter-spacing="4">RADAR</text>
</svg>
